name: CI

on:
  push:
    branches:
      - main

jobs:
  build-apk:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ✅ CLAVE: cachear ~/.buildozer guarda el SDK/NDK/p4a descargados
      # Reduce el tiempo de build de ~60 min a ~5 min en builds posteriores
      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-global-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-global-

      # ✅ Cachear .buildozer local guarda los artefactos de compilación del proyecto
      - name: Cache Buildozer local directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-local-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-local-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libgdbm-dev \
            libssl-dev libffi-dev libsqlite3-dev \
            cmake ninja-build

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer "Cython<3.0"

      - name: Build APK
        # ✅ Se limpian TODAS las variables de Android del runner de GitHub
        # para que Buildozer descargue y gestione su propio SDK/NDK
        # sin conflictos con las versiones pre-instaladas
        env:
          ANDROID_HOME: ""
          ANDROID_SDK_ROOT: ""
          ANDROID_NDK_HOME: ""
          ANDROID_NDK_ROOT: ""
          ANDROID_NDK_LATEST_HOME: ""
        run: |
          buildozer -v android debug 2>&1 | tee build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: labubu-calc-apk
          path: bin/*.apk
          if-no-files-found: error

      # ✅ Sube el log siempre que falle para poder diagnosticar el error
      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build.log
